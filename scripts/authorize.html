<!--
  Apple Music — one-time Music User Token grabber (run locally, in a browser).

  Steps:
    1. Run `node scripts/generate-dev-token.mjs` and copy the printed token.
    2. Paste it below in place of PASTE_DEV_TOKEN_HERE.
    3. Serve this folder (MusicKit needs a real http origin, not file://). From
       the repo root:
         npx serve scripts
       then open the printed URL + /authorize.html (serve may show it as
       /authorize — that's fine).
    4. When the button is enabled, click "Authorize Apple Music" and sign in.
    5. The Music User Token appears in the box on the page (and the console).
       That value is your APPLE_MUSIC_USER_TOKEN env var (~6 months; rotate
       manually).
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourtNotes — Authorize Apple Music</title>
    <script
      src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"
      data-web-components
      async
    ></script>
  </head>
  <body style="font-family: system-ui, sans-serif; max-width: 42rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5;">
    <h1>Authorize Apple Music</h1>
    <p id="status">Loading MusicKit…</p>
    <button id="authorize" disabled>Authorize Apple Music</button>

    <p style="margin-top: 2rem;"><strong>Music User Token</strong> (copy this into <code>APPLE_MUSIC_USER_TOKEN</code>):</p>
    <textarea id="token" readonly rows="4" style="width: 100%; font-family: monospace; box-sizing: border-box;" placeholder="Token will appear here after you authorize…"></textarea>
    <button id="copy" disabled style="margin-top: 0.5rem;">Copy token</button>

    <script>
      // Paste the token printed by scripts/generate-dev-token.mjs here.
      const DEVELOPER_TOKEN = "PASTE_DEV_TOKEN_HERE";

      const statusEl = document.getElementById("status");
      const authBtn = document.getElementById("authorize");
      const tokenEl = document.getElementById("token");
      const copyBtn = document.getElementById("copy");

      function setStatus(msg) {
        statusEl.textContent = msg;
        console.log("[authorize]", msg);
      }

      async function configureMusicKit() {
        if (!DEVELOPER_TOKEN || DEVELOPER_TOKEN === "PASTE_DEV_TOKEN_HERE") {
          setStatus("No developer token set — paste one into DEVELOPER_TOKEN and reload.");
          return;
        }
        try {
          await MusicKit.configure({
            developerToken: DEVELOPER_TOKEN,
            app: { name: "CourtNotes", build: "1.0.0" },
          });
          authBtn.disabled = false;
          setStatus("Ready. Click “Authorize Apple Music” and sign in.");
        } catch (err) {
          setStatus("MusicKit.configure failed: " + (err && err.message ? err.message : err));
          console.error(err);
        }
      }

      // MusicKit's script is async: it may finish BEFORE this listener is added
      // (warm cache) or AFTER. Handle both — otherwise the button never enables.
      if (window.MusicKit) {
        configureMusicKit();
      } else {
        document.addEventListener("musickitloaded", configureMusicKit);
      }

      authBtn.addEventListener("click", async () => {
        setStatus("Opening Apple sign-in… (allow the popup if your browser blocks it)");
        try {
          const music = MusicKit.getInstance();
          const userToken = await music.authorize();
          tokenEl.value = userToken;
          copyBtn.disabled = false;
          setStatus("Success — your Music User Token is below.");
          console.log("Music User Token:", userToken);
        } catch (err) {
          setStatus("Authorization failed: " + (err && err.message ? err.message : err));
          console.error(err);
        }
      });

      copyBtn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(tokenEl.value);
          copyBtn.textContent = "Copied!";
          setTimeout(() => (copyBtn.textContent = "Copy token"), 1500);
        } catch {
          tokenEl.select();
          document.execCommand("copy");
        }
      });
    </script>
  </body>
</html>
